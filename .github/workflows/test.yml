---
name: Run tests
on:
  pull_request: ~
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # renovate: datasource=git-refs-master packageName=https://github.com/neovim/neovim
  NEOVIM_NIGHTLY_COMMIT: 1665b992b7bd34f5130a37a973b292e580adc381

jobs:
  pnpm-tests:
    name: pnpm test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm test

  build-neovim-nightly:
    runs-on: ubuntu-24.04
    steps:
      - name: Build pinned Neovim nightly
        uses: mikavilpas/neovim-action/build-nightly@4f1c9a2235ee7428930602c0ba3e4f20377b61d8 # v3.3.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

  end-to-end-tests:
    name: end-to-end-tests
    needs: build-neovim-nightly
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        # https://github.com/rhysd/action-setup-vim/blob/master/action.yml
        neovim_version: ["nightly", "stable"]
    env:
      MISE_ENV: ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: install dependencies and build
        # Build the library before the full install so workspace consumers
        # (e.g. integration-tests) can link the `tui` bin against an existing
        # target. pnpm 11 no longer creates the bin symlink speculatively when
        # the target file is missing, and a later `pnpm install` short-circuits
        # with "Already up to date" without retrying — so the order matters.
        run: |
          pnpm install --filter library
          pnpm --filter library build
          pnpm install

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false

      - name: Install tools
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          # make the tools available for subsequent steps
          echo "$(pwd)/bin" >> "$GITHUB_PATH"
          curl --silent --location \
              https://raw.githubusercontent.com/houseabsolute/ubi/master/bootstrap/bootstrap-ubi.sh |
              TARGET="$HOME/.local/bin" sh

          VERSION=$(yq '.tools."github:EmmyLuaLs/emmylua-analyzer-rust".version' mise.toml)
          ubi --project EmmyLuaLs/emmylua-analyzer-rust --tag "$VERSION" --exe emmylua_ls --matching-regex "^emmylua_ls"

          mise install cowsay
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pinned Neovim nightly
        if: matrix.neovim_version == 'nightly'
        uses: mikavilpas/neovim-action/restore-nightly@4f1c9a2235ee7428930602c0ba3e4f20377b61d8 # v3.3.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

      - name: Install stable Neovim
        if: matrix.neovim_version == 'stable'
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: stable

      - run: |
          cd packages/integration-tests
          pnpm i # make sure the tui command is found

          # NVIM_APPNAME=nvim is the default, but spelled out here for clarity
          NVIM_APPNAME=nvim pnpm tui neovim prepare
          NVIM_APPNAME=nvim_alt pnpm tui neovim prepare

      - name: Test that tui neovim exec works
        run: |
          # test that tui neovim exec works
          pnpm tui neovim exec version

      - name: Test that tui neovim exec warns for missing NVIM_APPNAME
        run: |
          # allow this test to fail
          set +e
          # test that tui neovim exec works
          NVIM_APPNAME=doesnotexist pnpm tui neovim exec version 2>&1 | tee output.txt
          # make sure the exit code is non-zero
          test $? -ne 0 || (echo "Expected non-zero exit code" && exit 1)
          grep "Please set NVIM_APPNAME to one of the configured names" output.txt || (echo "Did not find expected warning" && exit 1)

      # need to work around https://github.com/cypress-io/github-action/issues/1246
      - run: pnpm --filter integration-tests exec cypress install

      - name: Cypress run
        uses: cypress-io/github-action@fa4a118725a8f001170d49631ea89e5d66fee626 # v7.4.1
        with:
          command: |
            pnpm tui run

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # add the line below to store screenshots only on failures
        # if: failure()
        if: failure()
        with:
          name: cypress-screenshots
          path: packages/integration-tests/cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`
